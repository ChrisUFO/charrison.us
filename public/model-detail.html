<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email Security Benchmark v8.5 — Model Detail</title>
  <link rel="stylesheet" href="clufo.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    body { padding: 0 0 3rem; }
    .back-bar {
      max-width: 1000px;
      margin: 1rem auto 0;
      padding: 0 1rem;
    }
    .back-bar a {
      color: var(--accent-secondary);
      text-decoration: none;
      font-size: 0.85rem;
    }
    .back-bar a:hover { text-decoration: underline; }
    .model-header {
      text-align: center;
      padding: 1.5rem 1rem 1rem;
    }
    .model-header h1 {
      font-family: var(--font-heading);
      font-size: clamp(1.2rem, 3.5vw, 2rem);
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 0 0 0.3rem;
    }
    .model-header .sub {
      color: var(--text-secondary);
      font-size: 0.85rem;
    }
    .stats-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      justify-content: center;
      margin: 1rem auto;
      max-width: 900px;
      padding: 0 1rem;
    }
    .stat {
      background: var(--bg-card);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      padding: 0.8rem 1.2rem;
      text-align: center;
      min-width: 100px;
      flex: 1;
      backdrop-filter: blur(10px);
    }
    .stat .val {
      font-family: var(--font-heading);
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--accent-secondary);
    }
    .stat .lbl {
      font-size: 0.7rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .test-list {
      max-width: 1000px;
      margin: 1.5rem auto;
      padding: 0 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }
    .test-card {
      background: var(--bg-card);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      padding: 0.9rem 1rem;
      backdrop-filter: blur(10px);
    }
    .test-card.red-miss { border-color: rgba(248, 113, 113, 0.3); background: rgba(248, 113, 113, 0.03); }
    .test-card.green-fp { border-color: rgba(251, 191, 36, 0.3); background: rgba(251, 191, 36, 0.03); }
    .test-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-bottom: 0.4rem;
    }
    .test-name {
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--text-primary);
    }
    .test-badges {
      display: flex;
      gap: 0.35rem;
      flex-wrap: wrap;
    }
    .badge {
      font-size: 0.65rem;
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 500;
    }
    .badge-cov { background: rgba(56, 189, 248, 0.15); color: #38bdf8; }
    .badge-expert { background: rgba(192, 132, 252, 0.15); color: #c084fc; }
    .badge-miss { background: rgba(248, 113, 113, 0.2); color: #f87171; }
    .badge-fp { background: rgba(251, 191, 36, 0.15); color: #fbbf24; }
    .badge-ok { background: rgba(74, 222, 128, 0.15); color: #4ade80; }
    .badge-warn { background: rgba(251, 191, 36, 0.15); color: #fbbf24; }
    .badge-range { background: rgba(248, 113, 113, 0.15); color: #fb7185; }
    .badge-threat { background: rgba(248, 113, 113, 0.1); color: #f87171; }
    .badge-safe { background: rgba(74, 222, 128, 0.1); color: #4ade80; }
    .test-scores {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      font-size: 0.82rem;
      margin-bottom: 0.4rem;
    }
    .score-pair {
      display: flex;
      gap: 0.3rem;
      align-items: baseline;
    }
    .score-label {
      color: var(--text-secondary);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .score-val {
      font-weight: 600;
      font-family: var(--font-heading);
    }
    .score-val.high { color: #f87171; }
    .score-val.low { color: #4ade80; }
    .score-val.neutral { color: var(--text-primary); }
    .score-val.in-range { color: #4ade80; }
    .score-val.out-range { color: #f87171; }
    .range-bar {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-top: 0.3rem;
    }
    .range-visual {
      position: relative;
      width: 120px;
      height: 8px;
      background: rgba(255,255,255,0.1);
      border-radius: 4px;
      overflow: hidden;
    }
    .range-fill {
      position: absolute;
      height: 100%;
      background: rgba(74, 222, 128, 0.3);
      border-radius: 4px;
    }
    .range-marker {
      position: absolute;
      top: -2px;
      width: 2px;
      height: 12px;
      border-radius: 1px;
    }
    .marker-cov { background: #38bdf8; }
    .marker-expert { background: #c084fc; }
    .detail-text {
      color: var(--text-secondary);
      font-size: 0.78rem;
      margin-top: 0.3rem;
      line-height: 1.5;
    }
    .loading {
      text-align: center;
      padding: 4rem 1rem;
      color: var(--text-secondary);
      font-size: 1.1rem;
    }
    .summary-section {
      max-width: 900px;
      margin: 1.5rem auto;
      padding: 0 1rem;
    }
    .summary-card {
      background: var(--bg-card);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      padding: 1.2rem 1.4rem;
      backdrop-filter: blur(10px);
    }
    .summary-card h2 {
      font-family: var(--font-heading);
      font-size: 1rem;
      color: var(--accent-secondary);
      margin: 0 0 0.8rem;
    }
    .summary-text {
      color: var(--text-primary);
      font-size: 0.88rem;
      line-height: 1.65;
      margin: 0 0 1rem;
    }
    .summary-breakdown {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 0.5rem;
      margin-top: 0.8rem;
    }
    .breakdown-item {
      background: rgba(255,255,255,0.03);
      border-radius: 6px;
      padding: 0.5rem 0.7rem;
      font-size: 0.78rem;
    }
    .breakdown-item .bi-label {
      color: var(--text-secondary);
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .breakdown-item .bi-val {
      font-weight: 600;
      font-size: 0.95rem;
      margin-top: 2px;
    }
    .bi-val.good { color: #4ade80; }
    .bi-val.bad { color: #f87171; }
    .bi-val.warn { color: #fbbf24; }
    .bi-val.neutral { color: var(--text-primary); }
    .error-msg {
      text-align: center;
      padding: 4rem 1rem;
      color: #f87171;
    }
    @media (max-width: 600px) {
      .summary-breakdown { grid-template-columns: 1fr 1fr; }
      .stats-row { flex-direction: column; align-items: stretch; }
      .stat { min-width: auto; }
      .test-top { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

  <div class="back-bar">
    <a href="results-email-security.html">← Back to Leaderboard</a>
  </div>

  <div class="model-header">
    <h1 id="model-name">Loading...</h1>
    <div class="sub" id="model-sub"></div>
  </div>

  <div class="stats-row" id="stats"></div>

  <div class="summary-section" id="summary">
    <div class="loading">Loading test results...</div>
  </div>

  <div class="test-list" id="tests">
    <div class="loading">Loading test results...</div>
  </div>

<script>
(async function() {
  const params = new URLSearchParams(window.location.search);
  const modelKey = params.get('model');
  if (!modelKey) {
    document.getElementById('tests').innerHTML = '<div class="error-msg">No model specified. Go back to <a href="results-email-security.html">results</a>.</div>';
    return;
  }

  let data;
  try {
    const resp = await fetch('benchmark-data.json');
    data = await resp.json();
  } catch(e) {
    document.getElementById('tests').innerHTML = '<div class="error-msg">Failed to load benchmark data.</div>';
    return;
  }

  const model = data[modelKey];
  if (!model) {
    document.getElementById('tests').innerHTML = '<div class="error-msg">Model "' + escapeHTML(decodeURIComponent(modelKey)) + '" not found.</div>';
    return;
  }

  // Expand short keys
  const name = model.n;
  const source = model.s;
  const covScore = model.cv;
  const expertScore = model.ex;
  const compositeScore = model.cs;
  const divergenceRate = model.dr;
  const redMisses = model.rm;
  const greenFPs = model.gf;
  const rangePenalties = model.rp;
  const totalCost = model.tc;
  const tests = model.t || [];

  // Separate CoV and Expert tests
  const covTests = tests.filter(t => t.m === 'cov');
  const expertTests = tests.filter(t => t.m === 'expert');

  // Header
  document.getElementById('model-name').textContent = name;
  document.getElementById('model-sub').textContent = 'v8.5 · CoV + Expert dual-prompt';

  // Stats
  document.getElementById('stats').innerHTML =
    '<div class="stat"><div class="val">' + (compositeScore || '—') + '</div><div class="lbl">Composite</div></div>' +
    '<div class="stat"><div class="val">' + (covScore !== null ? covScore : '—') + '</div><div class="lbl">CoV Score</div></div>' +
    '<div class="stat"><div class="val">' + (expertScore !== null ? expertScore : '—') + '</div><div class="lbl">Expert Score</div></div>' +
    '<div class="stat"><div class="val">' + (divergenceRate || 0) + '%</div><div class="lbl">Divergence</div></div>' +
    '<div class="stat"><div class="val">' + redMisses + '</div><div class="lbl">Red Misses</div></div>' +
    '<div class="stat"><div class="val">' + greenFPs + '</div><div class="lbl">Green FP</div></div>' +
    '<div class="stat"><div class="val">' + rangePenalties + '</div><div class="lbl">Range Pen</div></div>' +
    '<div class="stat"><div class="val">$' + totalCost.toFixed(2) + '</div><div class="lbl">Total Cost</div></div>';

  // Build per-test merged view: match CoV and Expert by label
  const covByLabel = {};
  const expertByLabel = {};
  covTests.forEach(t => { covByLabel[t.l] = t; });
  expertTests.forEach(t => { expertByLabel[t.l] = t; });

  // Get all unique labels (preserving CoV order)
  const allLabels = [...new Set([...covTests.map(t => t.l), ...expertTests.map(t => t.l)])];

  // Sort: red misses first, then green FP, then by divergence, then by label
  const mergedTests = allLabels.map(label => ({
    label,
    cov: covByLabel[label] || null,
    expert: expertByLabel[label] || null,
  }));

  mergedTests.sort((a, b) => {
    const aRedMiss = isRedMiss(a);
    const bRedMiss = isRedMiss(b);
    if (aRedMiss && !bRedMiss) return -1;
    if (!aRedMiss && bRedMiss) return 1;
    const aGreenFP = isGreenFP(a);
    const bGreenFP = isGreenFP(b);
    if (aGreenFP && !bGreenFP) return -1;
    if (!aGreenFP && bGreenFP) return 1;
    // Sort by max trust score (worst first)
    const aMax = Math.max(a.cov ? a.cov.v : 0, a.expert ? a.expert.v : 0);
    const bMax = Math.max(b.cov ? b.cov.v : 0, b.expert ? b.expert.v : 0);
    return bMax - aMax;
  });

  // Summary
  generateSummary(name, covScore, expertScore, compositeScore, divergenceRate, redMisses, greenFPs, rangePenalties, mergedTests);

  // Test cards
  const testsEl = document.getElementById('tests');
  testsEl.innerHTML = '';

  mergedTests.forEach(m => {
    const { label, cov, expert } = m;
    const isThreat = (cov && cov.th) || (expert && expert.th);
    const classification = (cov && cov.ok !== undefined) ? (cov.th ? 'threat' : 'safe') : ((expert && expert.th) ? 'threat' : 'safe');

    const redMiss = isRedMiss(m);
    const greenFP = isGreenFP(m);
    const outOfRange = isOutOfRange(m);

    const cls = (redMiss ? ' red-miss' : '') + (greenFP ? ' green-fp' : '');

    let html = '<div class="test-card' + cls + '">';

    // Top row: label + badges
    html += '<div class="test-top">';
    html += '<span class="test-name">' + escapeHTML(label) + '</span>';
    html += '<div class="test-badges">';
    html += '<span class="badge ' + (isThreat ? 'badge-threat' : 'badge-safe') + '">' + (isThreat ? 'Threat' : 'Safe') + '</span>';
    if (redMiss) html += '<span class="badge badge-miss">Red Miss</span>';
    if (greenFP) html += '<span class="badge badge-fp">Green FP</span>';
    if (outOfRange) html += '<span class="badge badge-range">Out of Range</span>';
    html += '</div></div>';

    // Score comparison
    html += '<div class="test-scores">';

    if (cov) {
      const inRange = cov.v >= cov.rn && cov.v <= cov.rx;
      html += '<div class="score-pair"><span class="score-label">CoV</span> <span class="score-val ' + (inRange ? 'in-range' : 'out-range') + '">' + cov.v + '</span></div>';
    }
    if (expert) {
      const inRange = expert.v >= expert.rn && expert.v <= expert.rx;
      html += '<div class="score-pair"><span class="score-label">Expert</span> <span class="score-val ' + (inRange ? 'in-range' : 'out-range') + '">' + expert.v + '</span></div>';
    }

    // Expert range
    const ref = cov || expert;
    if (ref) {
      html += '<div class="score-pair"><span class="score-label">Expert Panel</span> <span class="score-val neutral">' + ref.rn.toFixed(1) + '–' + ref.rx.toFixed(1) + '</span>';
      html += ' <span style="color:var(--text-secondary);font-size:0.7rem;">(mean ' + ref.em.toFixed(1) + ')</span></div>';
    }

    // Divergence between CoV and Expert
    if (cov && expert) {
      const diff = Math.abs(cov.v - expert.v);
      const divCls = diff > 20 ? 'high' : diff > 10 ? 'warn' : 'neutral';
      html += '<div class="score-pair"><span class="score-label">Δ</span> <span class="score-val ' + divCls + '">' + diff + '</span></div>';
    }

    html += '</div>';

    // Range visual bar
    if (ref) {
      html += '<div class="range-bar">';
      html += '<span>0</span>';
      html += '<div class="range-visual">';
      // Range fill
      const left = ref.rn;
      const width = ref.rx - ref.rn;
      html += '<div class="range-fill" style="left:' + left + '%;width:' + width + '%;"></div>';
      // CoV marker
      if (cov) {
        html += '<div class="range-marker marker-cov" style="left:' + Math.min(cov.v, 100) + '%;" title="CoV: ' + cov.v + '"></div>';
      }
      // Expert marker
      if (expert) {
        html += '<div class="range-marker marker-expert" style="left:' + Math.min(expert.v, 100) + '%;" title="Expert: ' + expert.v + '"></div>';
      }
      html += '</div>';
      html += '<span>100</span>';
      html += '<span style="font-size:0.65rem;color:var(--text-secondary);margin-left:0.5rem;"><span style="color:#38bdf8;">■</span> CoV <span style="color:#c084fc;">■</span> Expert</span>';
      html += '</div>';
    }

    // Red flags
    if (cov && cov.fl && cov.fl.length > 0) {
      html += '<div class="detail-text"><strong style="color:var(--text-primary);">Red flags:</strong> ' + cov.fl.slice(0, 4).map(f => escapeHTML(f)).join(' · ') + (cov.fl.length > 4 ? ' +' + (cov.fl.length - 4) + ' more' : '') + '</div>';
    }

    // Threat type
    if (expert && expert.tt && expert.tt !== 'none') {
      html += '<div class="detail-text"><strong style="color:var(--text-primary);">Threat type:</strong> ' + escapeHTML(expert.tt) + '</div>';
    }

    html += '</div>';
    testsEl.innerHTML += html;
  });

  document.title = name + ' — Benchmark v8.5 Detail';

  // Helper functions
  function isRedMiss(m) {
    // Threat email where model gave high trust (missed the threat)
    if (!m.cov || !m.cov.th) return false;
    return m.cov.v > 40;
  }

  function isGreenFP(m) {
    // Safe email where model gave low trust (false positive)
    if (!m.cov || m.cov.th) return false;
    return m.cov.v < 40;
  }

  function isOutOfRange(m) {
    const check = (t) => {
      if (!t || t.rn === undefined) return false;
      return t.v < t.rn || t.v > t.rx;
    };
    return check(m.cov) || check(m.expert);
  }
})();

function escapeHTML(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function generateSummary(name, covScore, expertScore, compositeScore, divergenceRate, redMisses, greenFPs, rangePenalties, mergedTests) {
  const summaryEl = document.getElementById('summary');

  // Count threat/safe tests
  const threatTests = mergedTests.filter(m => m.cov && m.cov.th);
  const safeTests = mergedTests.filter(m => m.cov && !m.cov.th);

  // Count caught threats (trust < 40)
  const caughtThreats = threatTests.filter(m => m.cov && m.cov.v <= 40).length;
  const missedThreats = threatTests.filter(m => m.cov && m.cov.v > 40).length;
  const totalThreats = threatTests.length;

  // False positives on safe emails
  const falsePos = safeTests.filter(m => m.cov && m.cov.v < 40).length;
  const totalSafe = safeTests.length;

  // Average trust scores
  const avgCovTrust = mergedTests.filter(m => m.cov).reduce((s, m) => s + m.cov.v, 0) / mergedTests.filter(m => m.cov).length || 0;
  const avgExpertTrust = mergedTests.filter(m => m.expert).reduce((s, m) => s + m.expert.v, 0) / mergedTests.filter(m => m.expert).length || 0;

  // Average trust on threat emails
  const threatCovTrust = threatTests.length > 0 ? threatTests.reduce((s, m) => s + (m.cov ? m.cov.v : 0), 0) / threatTests.length : 0;

  // Build summary text
  let text = name + ' scored a composite of ' + (compositeScore || '—') + '. ';
  if (covScore !== null && expertScore !== null) {
    text += 'CoV score: ' + covScore + ', Expert score: ' + expertScore + '. ';
    if (covScore === expertScore) {
      text += 'Perfect agreement between methods. ';
    } else {
      text += 'Divergence between methods: ' + divergenceRate + '% of tests. ';
    }
  }

  text += 'Caught ' + caughtThreats + ' of ' + totalThreats + ' threats';
  if (missedThreats > 0) text += ' (' + missedThreats + ' missed)';
  text += '. ';

  if (falsePos > 0) {
    text += 'Flagged ' + falsePos + ' of ' + totalSafe + ' safe emails as threats (false positives). ';
  } else if (totalSafe > 0) {
    text += 'No false positives on safe emails. ';
  }

  text += 'Average trust on threat emails: ' + threatCovTrust.toFixed(1) + '/100 (lower = more cautious). ';

  // Range penalty context
  if (rangePenalties > 0) {
    text += 'Scored outside expert panel range on ' + rangePenalties + ' of 37 tests.';
  } else {
    text += 'All scores within expert panel ranges.';
  }

  let html = '<div class="summary-card">';
  html += '<h2>📊 Performance Summary</h2>';
  html += '<p class="summary-text">' + escapeHTML(text) + '</p>';

  html += '<div class="summary-breakdown">';
  const addBI = (label, val, cls) => {
    html += '<div class="breakdown-item"><div class="bi-label">' + label + '</div><div class="bi-val ' + cls + '">' + val + '</div></div>';
  };

  addBI('Composite', compositeScore || '—', (compositeScore || 0) >= 90 ? 'good' : (compositeScore || 0) >= 70 ? 'warn' : 'bad');
  addBI('CoV', covScore !== null ? covScore : '—', (covScore || 0) >= 90 ? 'good' : (covScore || 0) >= 70 ? 'warn' : 'bad');
  addBI('Expert', expertScore !== null ? expertScore : '—', (expertScore || 0) >= 90 ? 'good' : (expertScore || 0) >= 70 ? 'warn' : 'bad');
  addBI('Threats Caught', caughtThreats + '/' + totalThreats, missedThreats === 0 ? 'good' : missedThreats <= 3 ? 'warn' : 'bad');
  addBI('False Positives', falsePos + '/' + totalSafe, falsePos === 0 ? 'good' : 'bad');
  addBI('Divergence', divergenceRate + '%', divergenceRate <= 30 ? 'good' : divergenceRate <= 60 ? 'warn' : 'bad');
  addBI('Red Misses', redMisses, redMisses === 0 ? 'good' : redMisses <= 3 ? 'warn' : 'bad');
  addBI('Range Penalties', rangePenalties + '/37', rangePenalties <= 10 ? 'good' : rangePenalties <= 25 ? 'warn' : 'bad');
  addBI('Avg Threat Trust', threatCovTrust.toFixed(1), threatCovTrust <= 15 ? 'good' : threatCovTrust <= 30 ? 'warn' : 'bad');

  html += '</div>';

  // Hardest tests
  const hardest = threatTests.filter(m => m.cov && m.cov.v > 30).sort((a, b) => (b.cov ? b.cov.v : 0) - (a.cov ? a.cov.v : 0)).slice(0, 3);
  if (hardest.length > 0) {
    html += '<div style="margin-top:1rem;">';
    html += '<div style="font-size:0.78rem;color:var(--text-secondary);margin-bottom:0.3rem;">Most challenging threats for this model:</div>';
    hardest.forEach(m => {
      html += '<div style="display:flex;justify-content:space-between;padding:0.3rem 0;border-bottom:1px solid rgba(255,255,255,0.05);font-size:0.82rem;">';
      html += '<span style="color:var(--text-primary);">' + escapeHTML(m.label) + '</span>';
      html += '<span class="badge badge-miss">CoV: ' + (m.cov ? m.cov.v : '?') + (m.expert ? ' / Exp: ' + m.expert.v : '') + '</span>';
      html += '</div>';
    });
    html += '</div>';
  }

  html += '</div>';
  summaryEl.innerHTML = html;
}
</script>

</body>
</html>
